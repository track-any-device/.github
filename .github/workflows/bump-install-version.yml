name: Bump version in install.sh

# Called by server app release workflows after a successful Docker image push.
# Updates the version variable in install.sh so the next install.sh run
# deploys the latest image.
#
# Required org secret: ORG_GITHUB_TOKEN with contents:write on .github repo.

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service key in install.sh (e.g. TAD_SERVER_LOGIN_TAG)'
        required: true
        type: string
      version:
        description: 'New version tag (e.g. v0.4.4)'
        required: true
        type: string
      commit_message:
        description: 'Commit message'
        required: false
        default: 'chore: bump version in install.sh [skip ci]'
        type: string

jobs:
  bump:
    name: Bump ${{ inputs.service }} → ${{ inputs.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in install.sh
        env:
          SERVICE: ${{ inputs.service }}
          VERSION: ${{ inputs.version }}
        run: |
          if ! grep -q "${SERVICE}=" install.sh; then
            echo "::error::${SERVICE} not found in install.sh"
            exit 1
          fi

          sed -i "s|${SERVICE}=\"[^\"]*\"|${SERVICE}=\"${VERSION}\"|g" install.sh

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add install.sh

          if git diff --staged --quiet; then
            echo "Version already up to date — no commit needed."
          else
            git commit -m "${{ inputs.commit_message }}"
            git push
          fi

      - name: Summary
        run: |
          echo "### install.sh updated" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | \`${{ inputs.service }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ inputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
