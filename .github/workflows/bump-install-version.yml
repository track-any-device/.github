name: Bump version in install.sh + tad.sh

# Called by server app release workflows after a successful Docker image push.
# Updates the version variable in BOTH install.sh (Compose installer) and tad.sh
# (Swarm installer) so the next run of either deploys the latest image.
#
# Required org secret: ORG_GITHUB_TOKEN with contents:write on .github repo.

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service key in install.sh + tad.sh (TAD_SERVER_API_TAG, TAD_SERVER_TENANT_TAG, TAD_SERVER_WEB_TAG, TAD_JT808_TAG, TAD_GT06_TAG, TAD_H02_TAG)'
        required: true
        type: choice
        options:
          - TAD_SERVER_API_TAG
          - TAD_SERVER_TENANT_TAG
          - TAD_SERVER_WEB_TAG
          - TAD_JT808_TAG
          - TAD_GT06_TAG
          - TAD_H02_TAG
      version:
        description: 'New version tag (e.g. v0.4.4)'
        required: true
        type: string
      commit_message:
        description: 'Commit message'
        required: false
        default: 'chore: bump version in install.sh [skip ci]'
        type: string

jobs:
  bump:
    name: Bump ${{ inputs.service }} → ${{ inputs.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in install.sh + tad.sh
        env:
          SERVICE: ${{ inputs.service }}
          VERSION: ${{ inputs.version }}
        run: |
          # Retired services — SSO login, Filament admin, and GraphQL were
          # removed from the platform. Reject any attempt to bump them.
          case "${SERVICE}" in
            TAD_SERVER_LOGIN_TAG|TAD_SERVER_ADMIN_TAG|TAD_SERVER_GRAPHQL_TAG)
              echo "::error::${SERVICE} is retired and no longer exists in the installers"
              exit 1
              ;;
          esac

          # Bump the tag in BOTH installers — install.sh (Compose) and tad.sh (Swarm).
          # A service may not appear in every installer, so update each file only where
          # the key exists; error only if it's in neither.
          updated=""
          for f in install.sh tad.sh; do
            if grep -q "${SERVICE}=" "$f"; then
              sed -i "s|${SERVICE}=\"[^\"]*\"|${SERVICE}=\"${VERSION}\"|g" "$f"
              git add "$f"
              updated="${updated} $f"
            fi
          done

          if [ -z "${updated}" ]; then
            echo "::error::${SERVICE} not found in install.sh or tad.sh"
            exit 1
          fi
          echo "Updated:${updated}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --staged --quiet; then
            echo "Version already up to date — no commit needed."
          else
            git commit -m "${{ inputs.commit_message }}"
            git push
          fi

      - name: Summary
        run: |
          echo "### install.sh + tad.sh updated" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | \`${{ inputs.service }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ inputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
