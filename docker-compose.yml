# ──────────────────────────────────────────────────────────────────────────────
# Track Any Device — FULL PLATFORM STACK
#
# This is the master docker-compose for running the entire platform locally.
# It pulls published Docker images from Docker Hub and wires them together.
#
# Quick start:
#   1. Copy .env.example → .env and fill in the required values.
#   2. docker compose up -d
#   3. docker compose exec cli php artisan migrate --seed
#   4. Open the services listed below.
#
# Profiles (optional features):
#   docker compose --profile logging up -d   → Grafana log viewer  :3000
# #   docker compose --profile frp     up -d   → frp tunnel for JT808 TCP
#
# ── Image version matrix ─────────────────────────────────────────────────────
# Bump these when a new release is tagged. Format: v0.1.{commit-count}-{sha}
#
#   Service                Image                                    Latest tag
#   ─────────────────────  ───────────────────────────────────────  ──────────────────────
#   server-login           trackanydevice/server-login              v0.4.3
#   server-admin           trackanydevice/server-admin              v0.0.9
#   server-api             trackanydevice/server-api                v0.1.424-ac19c5e0
#   server-graphql         trackanydevice/server-graphql            v0.0.7
#   server-tenant          trackanydevice/server-tenant             (see below)
#   server-cron            trackanydevice/server-cron               (same as server-api)
#   server-queue           trackanydevice/server-queue              (same as server-api)
#   server-cli             trackanydevice/server-cli                (same as server-api)
#   jt808-server           trackanydevice/jt808-server              0.1.1
#
#   Third-party images are pinned below — upgrade intentionally, never blindly.
#
# Service map:
#   login     → login.track-any-device.com       SSO identity provider
#   admin     → admin.track-any-device.com       Filament admin panel
#   api       → api.track-any-device.com         Central REST API server
#   graphql   → graphql.track-any-device.com     GraphQL API + Explorer
#   web       → track-any-device.com             Marketing site + "my" portal
#   jt808     → :7018 TCP                        JT808 GPS tracker endpoint
#   soketi    → :6001 WS                         Real-time WebSocket server
#   mysql     → :3306                            Central database
#   redis     → :6379                            Cache / queues / sessions
#   pma       → :3333                            phpMyAdmin (dev)
#   mailtrap  → :8025                            Dev email web UI
#   influxdb  → :8086                            Time-series telemetry
# ──────────────────────────────────────────────────────────────────────────────

x-app-base: &app-base
  networks:
    - tda
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_started
    soketi:
      condition: service_healthy
  restart: unless-stopped

x-app-environment: &app-environment
  APP_ENV:   ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  TRUSTED_PROXIES: "*"
  SESSION_DOMAIN:  ${SESSION_DOMAIN:-.track-any-device.com}
  APP_DOMAIN:      ${APP_DOMAIN:-track-any-device.com}
  LOGIN_DOMAIN:    ${LOGIN_DOMAIN:-login.track-any-device.com}
  ADMIN_DOMAIN:    ${ADMIN_DOMAIN:-admin.track-any-device.com}
  GRAPHQL_DOMAIN:  ${GRAPHQL_DOMAIN:-graphql.track-any-device.com}
  MY_DOMAIN:       ${MY_DOMAIN:-track-any-device.com}
  DB_CONNECTION: mysql
  DB_HOST:       mysql
  DB_PORT:       3306
  DB_DATABASE:   ${MYSQL_DATABASE}
  DB_USERNAME:   ${MYSQL_USER}
  DB_PASSWORD:   ${MYSQL_PASSWORD}
  CACHE_STORE:      redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER:   redis
  REDIS_HOST:       redis
  REDIS_PORT:       6379
  BROADCAST_CONNECTION: pusher
  PUSHER_APP_ID:     ${PUSHER_APP_ID}
  PUSHER_APP_KEY:    ${PUSHER_APP_KEY}
  PUSHER_APP_SECRET: ${PUSHER_APP_SECRET}
  PUSHER_HOST:       soketi
  PUSHER_PORT:       6001
  PUSHER_SCHEME:     http
  PUSHER_APP_CLUSTER: mt1
  MAIL_MAILER:       smtp
  MAIL_HOST:         mailtrap
  MAIL_PORT:         1025
  MAIL_FROM_ADDRESS: noreply@track-any-device.com
  INFLUXDB_HOST:   influxdb
  INFLUXDB_PORT:   8086
  INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-device_locations}
  INFLUXDB_ORG:    ${INFLUXDB_ORG:-track-any-device}
  INFLUXDB_TOKEN:  ${INFLUXDB_TOKEN}
  PASSPORT_PRIVATE_KEY_B64: ${PASSPORT_PRIVATE_KEY_B64}
  PASSPORT_PUBLIC_KEY_B64:  ${PASSPORT_PUBLIC_KEY_B64}

services:

  # ── SSO Identity Provider ────────────────────────────────────────────────────
  login:
    <<: *app-base
    image: trackanydevice/server-login:v0.4.3
    container_name: login
    volumes:
      - app_storage:/app/storage/app
    environment:
      <<: *app-environment
      APP_URL:        https://${LOGIN_DOMAIN}
      APP_KEY:        ${LOGIN_APP_KEY}
      SESSION_COOKIE: login_session
      SMS_MASTER_NUMBER:   ${SMS_MASTER_NUMBER}
      SMS_GATEWAY_URL:     ${SMS_GATEWAY_URL}
      SMS_GATEWAY_API_KEY: ${SMS_GATEWAY_API_KEY}

  # ── Filament Admin Panel ─────────────────────────────────────────────────────
  admin:
    <<: *app-base
    image: trackanydevice/server-admin:v0.0.9
    container_name: admin
    volumes:
      - app_storage:/app/storage/app
    environment:
      <<: *app-environment
      APP_URL:        https://${ADMIN_DOMAIN}
      APP_KEY:        ${ADMIN_APP_KEY}
      SESSION_COOKIE: admin_session

  # ── Central REST API Server ──────────────────────────────────────────────────
  api:
    <<: *app-base
    image: trackanydevice/server-api:v0.1.424-ac19c5e0
    container_name: api
    environment:
      <<: *app-environment
      APP_URL: https://api.${APP_DOMAIN}
      APP_KEY: ${API_APP_KEY}

  # ── GraphQL API ──────────────────────────────────────────────────────────────
  graphql:
    <<: *app-base
    image: trackanydevice/server-graphql:v0.0.7
    container_name: graphql
    environment:
      <<: *app-environment
      APP_URL:        https://${GRAPHQL_DOMAIN}
      APP_KEY:        ${GRAPHQL_APP_KEY}
      SESSION_COOKIE: graphql_session
      GRAPHQL_KEY:    ${GRAPHQL_KEY}
      GRAPHQL_SECRET: ${GRAPHQL_SECRET}

  # ── Next.js Website + "My" User Portal ──────────────────────────────────────
  # Deployed to Cloudflare Pages — NOT a Docker service.
  # Configure env vars in wrangler.toml or Cloudflare Pages dashboard.
  # Tunnel: track-any-device.com is served directly by Cloudflare Pages
  #         (no tunnel ingress rule needed for the web frontend).

  # ── Background workers ───────────────────────────────────────────────────────
  cron:
    <<: *app-base
    image: trackanydevice/server-cron:v0.1.424-ac19c5e0
    container_name: cron
    environment:
      <<: *app-environment
      APP_KEY: ${API_APP_KEY}

  queue:
    <<: *app-base
    image: trackanydevice/server-queue:v0.1.424-ac19c5e0
    container_name: queue
    environment:
      <<: *app-environment
      APP_KEY: ${API_APP_KEY}

  cli:
    image: trackanydevice/server-cli:v0.1.424-ac19c5e0
    container_name: cli
    networks:
      - tda
    environment:
      <<: *app-environment
      APP_KEY: ${API_APP_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── JT808 GPS TCP Server ─────────────────────────────────────────────────────
  # Source: github.com/track-any-device/server-jt808
  jt808:
    image: trackanydevice/jt808-server:0.1.1
    container_name: jt808
    ports:
      - "7018:7018"   # JT808 TCP — point GPS devices here
      - "9090:9090"   # Prometheus metrics + /healthz
    environment:
      JT808_TCP_ADDR:    :7018
      JT808_HTTP_ADDR:   :9090
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      STREAM_KEY:        jt808:telemetry
      STREAM_MAX_LEN:    100000
      SESSION_PREFIX:    "jt808:session:"
      AUTH_TOKEN_PREFIX: "jt808:authtoken:"
      ONLINE_Z_KEY:      jt808:online
      CMD_CHANNEL:       "jt808:cmd:"
      AUTH_TIMEOUT:      30s
      HEARTBEAT_TIMEOUT: 3m
      DB_HOST:           mysql
      DB_PORT:           3306
      DB_DATABASE:       ${MYSQL_DATABASE}
      DB_USERNAME:       ${MYSQL_USER}
      DB_PASSWORD:       ${MYSQL_PASSWORD}
      DB_DEVICE_TYPE_ID: ${JT808_DEVICE_TYPE_ID:-1}
    networks:
      - tda
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Per-tenant Portals ───────────────────────────────────────────────────────
  # Source: github.com/track-any-device/server-tenant
  # One block per tenant. Uncomment and fill in values for each.
  #
  # tenant_acme:
  #   image: trackanydevice/server-tenant:latest
  #   container_name: tenant_acme
  #   networks: [tda]
  #   restart: unless-stopped
  #   environment:
  #     APP_ENV: production
  #     APP_KEY: <generate: php artisan key:generate --show>
  #     APP_URL: https://acme.track-any-device.com
  #     APP_SURFACE: tenant
  #     APP_TENANT_SLUG: acme
  #     APP_TENANT_ID: <from admin panel>
  #     APP_TENANT_API_KEY: <from Portal API Keys tab>
  #     SSO_CLIENT_ID: <from admin panel>
  #     SSO_CLIENT_SECRET: <from admin panel>
  #     SSO_REDIRECT_URI: https://acme.track-any-device.com/sso/callback
  #     PLATFORM_API_URL: http://api
  #     PLATFORM_SSO_URL: https://login.track-any-device.com
  #     DB_CONNECTION: mysql
  #     DB_HOST: mysql
  #     DB_DATABASE: ${MYSQL_DATABASE}
  #     DB_USERNAME: ${MYSQL_USER}
  #     DB_PASSWORD: ${MYSQL_PASSWORD}
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     SESSION_DRIVER: redis
  #     SESSION_COOKIE: tenant_acme_session
  #     PUSHER_APP_KEY: ${PUSHER_APP_KEY}
  #     PUSHER_HOST: soketi
  #     PUSHER_PORT: 6001
  #     PUSHER_SCHEME: http
  #   depends_on:
  #     mysql:
  #       condition: service_healthy

  # ── Infrastructure ───────────────────────────────────────────────────────────

  mysql:
    # Pinned to 8.0.32 — do not upgrade without testing migrations.
    image: mysql:8.0.32
    container_name: mysql
    init: true
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tda
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    # 7-alpine — upgrade to 8-alpine when tested.
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - tda
    restart: unless-stopped

  soketi:
    image: quay.io/soketi/soketi:1.4-16-alpine
    container_name: soketi
    environment:
      SOKETI_DEFAULT_APP_ID:     ${PUSHER_APP_ID}
      SOKETI_DEFAULT_APP_KEY:    ${PUSHER_APP_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${PUSHER_APP_SECRET}
      SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES: 'true'
      SOKETI_DEFAULT_APP_ENABLED: 'true'
      SOKETI_DEFAULT_APP_MAX_CONNECTIONS: '${SOKETI_MAX_CONNECTIONS:-500}'
      SOKETI_CORS_ALLOWED_ORIGINS: '*'
      SOKETI_DEFAULT_APP_WEBHOOKS: '[{"url":"http://api/api/v1/webhooks/soketi","event_types":["channel_occupied","channel_vacated"]}]'
    ports:
      - '6001:6001'
      - '9601:9601'
    networks:
      - tda
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net');const s=net.connect(6001,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0);});s.on('error',()=>process.exit(1));\""]
      interval: 5s
      timeout: 2s
      retries: 10
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    ${INFLUXDB_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD:    ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG:         ${INFLUXDB_ORG:-track-any-device}
      DOCKER_INFLUXDB_INIT_BUCKET:      ${INFLUXDB_BUCKET:-device_locations}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - tda
    restart: unless-stopped

  mailtrap:
    image: axllent/mailpit:v1.24.0
    container_name: mailtrap
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025
    networks:
      - tda
    restart: unless-stopped

  pma:
    image: phpmyadmin/phpmyadmin:5.2.2
    container_name: pma
    environment:
      PMA_HOST:     mysql
      PMA_USER:     ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3333:80"   # → http://localhost:3333
    networks:
      - tda
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # Cloudflare Tunnel — routes public hostnames to containers without open ports.
  cloudflared:
    image: cloudflare/cloudflared:2025.5.0
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - tda
    dns: [8.8.8.8, 1.1.1.1]
    restart: unless-stopped

  # ── Logging stack (profile: logging) ────────────────────────────────────────
  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - tda
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    profiles: [logging]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED:  "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"   # → http://localhost:3000
    networks:
      - tda
    depends_on:
      loki:
        condition: service_healthy
    profiles: [logging]
    restart: unless-stopped

  # ── frp tunnel (profile: frp) ────────────────────────────────────────────────
  frpc:
    image: snowdreamtech/frpc:0.61.1
    container_name: frpc
    environment:
      - FRP_SERVER_ADDR=${FRP_SERVER_ADDR:-}
      - FRP_TOKEN=${FRP_TOKEN:-change-me}
    networks:
      - tda
    depends_on:
      jt808:
        condition: service_healthy
    profiles: [frp]
    restart: unless-stopped

networks:
  tda:
    driver: bridge

volumes:
  mysql_data:
  influxdb_data:
  loki_data:
  grafana_data:
  app_storage:    # shared storage between login and admin (logos, oauth keys)
